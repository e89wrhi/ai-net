syntax = "proto3";

package resume;
import "google/protobuf/timestamp.proto";

service ResumeGrpcService {
  rpc UploadResume (UploadResumeRequest) returns (UploadResumeResponse);
  rpc AnalyzeResume (AnalyzeResumeRequest) returns (AnalyzeResumeResponse);
  rpc ReAnalyzeResume (ReAnalyzeResumeRequest) returns (ReAnalyzeResumeResponse);
  rpc GetResumeAnalysis (GetResumeAnalysisRequest) returns (GetResumeAnalysisResponse);
}

message UploadResumeRequest {
  string user_id = 1;
  string candidate_name = 2;
  string resume_url = 3;
  string file_name = 4;
}

message UploadResumeResponse {
  string id = 1;
}

message AnalyzeResumeRequest {
  string resume_id = 1;
  string summary = 2;
  string parsed_text = 3;
}

message AnalyzeResumeResponse {
  string id = 1;
}

message ReAnalyzeResumeRequest {
  string resume_id = 1;
  string summary = 2;
  string parsed_text = 3;
}

message ReAnalyzeResumeResponse {
  string id = 1;
}

message GetResumeAnalysisRequest {
  string resume_id = 1;
}

message ResumeAnalysis {
  string id = 1;
  string candidate_name = 2;
  string summary = 3;
  string status = 4;
  google.protobuf.Timestamp analyzed_at = 5;
}

message GetResumeAnalysisResponse {
  ResumeAnalysis analysis = 1;
}