syntax = "proto3";

package learningAssistant;
import "google/protobuf/timestamp.proto";

service AssistantGrpcService {
  rpc GenerateLesson (GenerateLessonRequest) returns (GenerateLessonResponse);
}

message GenerateLessonRequest {
  string profile_id = 1;
  string title = 2;
  string content = 3;
  // Difficulty level as integer (aligns with backend enum)
  int32 level = 4;
}

message GenerateLessonResponse {
  string lesson_id = 1;
}