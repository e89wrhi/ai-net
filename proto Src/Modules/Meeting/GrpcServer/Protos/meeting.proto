syntax = "proto3";

package meeting;
import "google/protobuf/timestamp.proto";

service MeetingGrpcService {
  rpc UploadMeetingAudio (UploadMeetingAudioRequest) returns (UploadMeetingAudioResponse);
  rpc TranscribeMeeting (TranscribeMeetingRequest) returns (TranscribeMeetingResponse);
  rpc GetMeetingSummary (GetMeetingSummaryRequest) returns (GetMeetingSummaryResponse);
}

message UploadMeetingAudioRequest {
  string organizer_id = 1;
  string title = 2;
  string audio_url = 3;
}

message UploadMeetingAudioResponse {
  string id = 1;
}

message TranscribeMeetingRequest {
  string meeting_id = 1;
  string transcript_text = 2;
  string language = 3;
  double confidence = 4;
  string summary = 5;
}

message TranscribeMeetingResponse {
  string id = 1;
}

message GetMeetingSummaryRequest {
  string meeting_id = 1;
}

message MeetingSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string status = 4;
  google.protobuf.Timestamp created_at = 5;
}

message GetMeetingSummaryResponse {
  MeetingSummary summary = 1;
}
