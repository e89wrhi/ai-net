syntax = "proto3";

package user;
import "google/protobuf/timestamp.proto";

service UserGrpcService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message UserActivity {
  string id = 1;
  string module = 2;
  string action = 3;
  string resource_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message UserUsage {
  string id = 1;
  string period = 2;
  string token_used = 3;
  int32 requests_count = 4;
}

message GetUserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  repeated UserActivity activities = 5;
  repeated UserUsage usages = 6;
}