syntax = "proto3";

package resume;
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Resume.GrpcServer.Protos";

service ResumeGrpcService {
  rpc AnalyzeResume (AnalyzeResumeRequest) returns (AnalyzeResumeResponse);
}

message AnalyzeResumeRequest {
  string resume_id = 1;
  string summary = 2;
  string parsed_text = 3;
  bool include_skills = 4;
  bool include_education = 5;
  bool include_experience = 6;
}

message AnalyzeResumeResponse {
  string id = 1;
}
