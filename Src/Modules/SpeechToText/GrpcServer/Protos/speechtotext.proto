syntax = "proto3";

package SpeechToText;
import "google/protobuf/timestamp.proto";

service SpeechToTextGrpcService {
  rpc StartSpeechToText (StartSpeechToTextRequest) returns (StartSpeechToTextResponse);
  rpc DeleteSpeechToText (DeleteSpeechToTextRequest) returns (DeleteSpeechToTextResponse);
  rpc GetSpeechToTextHistory (GetSpeechToTextHistoryRequest) returns (GetSpeechToTextHistoryResponse);
}

message StartSpeechToTextRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartSpeechToTextResponse {
  string session_id = 1;
}

message DeleteSpeechToTextRequest {
  string session_id = 1;
}

message DeleteSpeechToTextResponse {
  string session_id = 1;
}

message GetSpeechToTextHistoryRequest {
  string user_id = 1;
}

message SpeechToText {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message SpeechToTextSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated SpeechToText messages = 8;
}

message GetSpeechToTextHistoryResponse {
  repeated SpeechToTextSummary speechtotexts = 1;
}