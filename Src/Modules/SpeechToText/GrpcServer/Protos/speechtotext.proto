syntax = "proto3";

package SpeechToText;

option csharp_namespace = "SpeechToText.GrpcServer.Protos";

service SpeechToTextGrpcService {
  rpc TranscribeAudio (TranscribeAudioRequest) returns (TranscribeAudioResponse);
  rpc StreamTranscribeAudio (StreamTranscribeAudioRequest) returns (stream StreamTranscribeAudioResponse);
}

enum SpeechToTextDetailLevel {
  BASIC = 0;
  STANDARD = 1;
  DETAILED = 2;
}

message TranscribeAudioRequest {
  string user_id = 1;
  string audio_url = 2;
  string language = 3;
  bool include_punctuation = 4;
  SpeechToTextDetailLevel detail_level = 5;
  string model_id = 6;
}

message TranscribeAudioResponse {
  string session_id = 1;
  string result_id = 2;
  string transcript = 3;
  string model_id = 4;
  string provider_name = 5;
}

message StreamTranscribeAudioRequest {
  string user_id = 1;
  string audio_url = 2;
  string language = 3;
  bool include_punctuation = 4;
  SpeechToTextDetailLevel detail_level = 5;
  string model_id = 6;
}

message StreamTranscribeAudioResponse {
  string text = 1;
}