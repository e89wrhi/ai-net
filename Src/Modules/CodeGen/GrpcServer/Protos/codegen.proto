syntax = "proto3";

package CodeGen;
import "google/protobuf/timestamp.proto";

service CodeGenGrpcService {
  rpc StartCodeGen (StartCodeGenRequest) returns (StartCodeGenResponse);
  rpc DeleteCodeGen (DeleteCodeGenRequest) returns (DeleteCodeGenResponse);
  rpc GetCodeGenHistory (GetCodeGenHistoryRequest) returns (GetCodeGenHistoryResponse);
}

message StartCodeGenRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartCodeGenResponse {
  string session_id = 1;
}

message DeleteCodeGenRequest {
  string session_id = 1;
}

message DeleteCodeGenResponse {
  string session_id = 1;
}

message GetCodeGenHistoryRequest {
  string user_id = 1;
}

message CodeGen {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message CodeGenSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated CodeGen messages = 8;
}

message GetCodeGenHistoryResponse {
  repeated CodeGenSummary codegens = 1;
}