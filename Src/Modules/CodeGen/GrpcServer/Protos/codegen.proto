syntax = "proto3";

package CodeGen;

option csharp_namespace = "CodeGen.GrpcServer.Protos";

service CodeGenGrpcService {
  rpc GenerateCode (GenerateCodeRequest) returns (GenerateCodeResponse);
  rpc ReGenerateCode (ReGenerateCodeRequest) returns (ReGenerateCodeResponse);
  rpc StreamGenerateCode (StreamGenerateCodeRequest) returns (stream StreamGenerateCodeResponse);
}

enum CodeQualityLevel {
  DRAFT = 0;
  PRODUCTION_READY = 1;
  OPTIMIZED = 2;
}

enum CodeStyle {
  MINIMAL = 0;
  STANDARD = 1;
  ENTERPRISE = 2;
  FUNCTIONAL = 3;
}

message GenerateCodeRequest {
  string user_id = 1;
  string prompt = 2;
  string language = 3;
  CodeQualityLevel quality = 4;
  CodeStyle style = 5;
  bool include_comments = 6;
  string model_id = 7;
}

message GenerateCodeResponse {
  string session_id = 1;
  string result_id = 2;
  string code = 3;
  string model_id = 4;
  string provider_name = 5;
}

message ReGenerateCodeRequest {
  string user_id = 1;
  string session_id = 2;
  string instruction = 3;
  string model_id = 4;
}

message ReGenerateCodeResponse {
  string result_id = 1;
  string code = 2;
  string model_id = 3;
  string provider_name = 4;
}

message StreamGenerateCodeRequest {
  string user_id = 1;
  string prompt = 2;
  string language = 3;
  CodeQualityLevel quality = 4;
  CodeStyle style = 5;
  bool include_comments = 6;
  string model_id = 7;
}

message StreamGenerateCodeResponse {
  string text = 1;
}