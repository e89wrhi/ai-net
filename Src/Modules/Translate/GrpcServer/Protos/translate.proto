syntax = "proto3";

package Translate;

option csharp_namespace = "Translate.GrpcServer.Protos";

service TranslateGrpcService {
  rpc TranslateText (TranslateTextRequest) returns (TranslateTextResponse);
  rpc StreamTranslateText (StreamTranslateTextRequest) returns (stream StreamTranslateTextResponse);
  rpc DetectLanguage (DetectLanguageRequest) returns (DetectLanguageResponse);
}

enum TranslationDetailLevel {
  BASIC = 0;
  STANDARD = 1;
  FLUENT = 2;
  FORMAL = 3;
}

message TranslateTextRequest {
  string user_id = 1;
  string text = 2;
  string source_language = 3;
  string target_language = 4;
  TranslationDetailLevel detail_level = 5;
  string model_id = 6;
}

message TranslateTextResponse {
  string session_id = 1;
  string result_id = 2;
  string translated_text = 3;
  string model_id = 4;
  string provider_name = 5;
}

message StreamTranslateTextRequest {
  string user_id = 1;
  string text = 2;
  string source_language = 3;
  string target_language = 4;
  TranslationDetailLevel detail_level = 5;
  string model_id = 6;
}

message StreamTranslateTextResponse {
  string text = 1;
}

message DetectLanguageRequest {
  string user_id = 1;
  string text = 2;
  string model_id = 3;
}

message DetectLanguageResponse {
  string detected_language_code = 1;
  double confidence = 2;
  string model_id = 3;
  string provider_name = 4;
}