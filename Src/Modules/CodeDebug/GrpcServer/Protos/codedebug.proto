syntax = "proto3";

package CodeDebug;

option csharp_namespace = "CodeDebug.GrpcServer.Protos";

service CodeDebugGrpcService {
  rpc AnalyzeCode (AnalyzeCodeRequest) returns (AnalyzeCodeResponse);
  rpc StreamAnalyzeCode (StreamAnalyzeCodeRequest) returns (stream StreamAnalyzeCodeResponse);
  rpc GenerateFix (GenerateFixRequest) returns (GenerateFixResponse);
}

enum ProgrammingLanguage {
  CSHARP = 0;
  JAVASCRIPT = 1;
  TYPESCRIPT = 2;
  PYTHON = 3;
  JAVA = 4;
  GO = 5;
  RUST = 6;
  OTHER = 7;
}

enum DebugDepth {
  SURFACE = 0;
  STANDARD = 1;
  DEEP = 2;
}

message AnalyzeCodeRequest {
  string user_id = 1;
  string code = 2;
  ProgrammingLanguage language = 3;
  DebugDepth depth = 4;
  bool include_suggestion = 5;
  string model_id = 6;
}

message AnalyzeCodeResponse {
  string session_id = 1;
  string report_id = 2;
  string summary = 3;
  int32 issue_count = 4;
  string model_id = 5;
  string provider_name = 6;
}

message StreamAnalyzeCodeRequest {
  string user_id = 1;
  string code = 2;
  ProgrammingLanguage language = 3;
  DebugDepth depth = 4;
  bool include_suggestion = 5;
  string model_id = 6;
}

message StreamAnalyzeCodeResponse {
  string text = 1;
}

message GenerateFixRequest {
  string user_id = 1;
  string session_id = 2;
  string report_id = 3;
  string model_id = 4;
}

message GenerateFixResponse {
  string fixed_code = 1;
  string explanation = 2;
  string model_id = 3;
  string provider_name = 4;
}