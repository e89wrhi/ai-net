syntax = "proto3";

package imageCaption;
import "google/protobuf/timestamp.proto";

service ImageGrpcService {
  rpc GenerateCaption (GenerateCaptionRequest) returns (GenerateCaptionResponse);
  rpc GetImageCaptions (GetImageCaptionsRequest) returns (GetImageCaptionsResponse);
}

message GenerateCaptionRequest {
  string image_id = 1;
  string caption_text = 2;
  double confidence = 3;
  string language = 4;
}

message GenerateCaptionResponse {
  string id = 1;
}

message GetImageCaptionsRequest {
  string image_id = 1;
}

message Caption {
  string id = 1;
  string text = 2;
  double confidence = 3;
  string language = 4;
  google.protobuf.Timestamp created_at = 5;
}

message GetImageCaptionsResponse {
  repeated Caption captions = 1;
}