syntax = "proto3";

package ImageCaption;

option csharp_namespace = "ImageCaption.GrpcServer.Protos";

service ImageCaptionGrpcService {
  rpc CaptionImage (CaptionImageRequest) returns (CaptionImageResponse);
  rpc AnalyzeImage (AnalyzeImageRequest) returns (AnalyzeImageResponse);
}

enum CaptionDetailLevel {
  SHORT = 0;
  STANDARD = 1;
  DETAILED = 2;
}

message CaptionImageRequest {
  string user_id = 1;
  string image_url_or_base64 = 2;
  CaptionDetailLevel level = 3;
  string model_id = 4;
}

message CaptionImageResponse {
  string session_id = 1;
  string result_id = 2;
  string caption = 3;
  string model_id = 4;
  string provider_name = 5;
}

message AnalyzeImageRequest {
  string user_id = 1;
  string image_url_or_base64 = 2;
  CaptionDetailLevel level = 3;
  string model_id = 4;
}

message AnalyzeImageResponse {
  string session_id = 1;
  string result_id = 2;
  string analysis = 3;
  string model_id = 4;
  string provider_name = 5;
}