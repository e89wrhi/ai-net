syntax = "proto3";

package Summary;

option csharp_namespace = "Summary.GrpcServer.Protos";

service SummaryGrpcService {
  rpc SummarizeText (SummarizeTextRequest) returns (SummarizeTextResponse);
  rpc StreamSummarizeText (StreamSummarizeTextRequest) returns (stream StreamSummarizeTextResponse);
}

enum SummaryDetailLevel {
  SHORT = 0;
  STANDARD = 1;
  DETAILED = 2;
}

message SummarizeTextRequest {
  string user_id = 1;
  string text = 2;
  SummaryDetailLevel detail_level = 3;
  string language = 4;
  string model_id = 5;
}

message SummarizeTextResponse {
  string session_id = 1;
  string result_id = 2;
  string summary = 3;
  string model_id = 4;
  string provider_name = 5;
}

message StreamSummarizeTextRequest {
  string user_id = 1;
  string text = 2;
  SummaryDetailLevel detail_level = 3;
  string language = 4;
  string model_id = 5;
}

message StreamSummarizeTextResponse {
  string text = 1;
}