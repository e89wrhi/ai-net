syntax = "proto3";

package ImageGen;

option csharp_namespace = "ImageGen.GrpcServer.Protos";

service ImageGenGrpcService {
  rpc GenerateImage (GenerateImageRequest) returns (GenerateImageResponse);
  rpc ReGenerateImage (ReGenerateImageRequest) returns (ReGenerateImageResponse);
}

enum ImageSize {
  SMALL = 0;
  MEDIUM = 1;
  LARGE = 2;
  SQUARE = 3;
  PORTRAIT = 4;
  LANDSCAPE = 5;
}

enum ImageStyle {
  REALISTIC = 0;
  ILLUSTRATION = 1;
  ANIME = 2;
  SKETCH = 3;
  DIGITAL_ART = 4;
  OIL_PAINTING = 5;
  WATERCOLOR = 6;
}

enum ImageQuality {
  LOW = 0;
  MEDIUM_QUALITY = 1;
  HIGH = 2;
  ULTRA = 3;
}

message GenerateImageRequest {
  string user_id = 1;
  string prompt = 2;
  ImageSize size = 3;
  ImageStyle style = 4;
  ImageQuality quality = 5;
  string model_id = 6;
}

message GenerateImageResponse {
  string session_id = 1;
  string result_id = 2;
  string image_url = 3;
  string model_id = 4;
  string provider_name = 5;
}

message ReGenerateImageRequest {
  string user_id = 1;
  string session_id = 2;
  string instruction = 3;
  string model_id = 4;
}

message ReGenerateImageResponse {
  string result_id = 1;
  string image_url = 2;
  string model_id = 3;
  string provider_name = 4;
}