syntax = "proto3";

package ImageGen;
import "google/protobuf/timestamp.proto";

service ImageGenGrpcService {
  rpc StartImageGen (StartImageGenRequest) returns (StartImageGenResponse);
  rpc DeleteImageGen (DeleteImageGenRequest) returns (DeleteImageGenResponse);
  rpc GetImageGenHistory (GetImageGenHistoryRequest) returns (GetImageGenHistoryResponse);
}

message StartImageGenRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartImageGenResponse {
  string session_id = 1;
}

message DeleteImageGenRequest {
  string session_id = 1;
}

message DeleteImageGenResponse {
  string session_id = 1;
}

message GetImageGenHistoryRequest {
  string user_id = 1;
}

message ImageGen {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message ImageGenSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated ImageGen messages = 8;
}

message GetImageGenHistoryResponse {
  repeated ImageGenSummary imagegens = 1;
}