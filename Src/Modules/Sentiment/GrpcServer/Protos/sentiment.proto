syntax = "proto3";

package Sentiment;

option csharp_namespace = "Sentiment.GrpcServer.Protos";

service SentimentGrpcService {
  rpc AnalyzeSentiment (AnalyzeSentimentRequest) returns (AnalyzeSentimentResponse);
  rpc AnalyzeSentimentDetailed (AnalyzeSentimentDetailedRequest) returns (AnalyzeSentimentDetailedResponse);
}

enum SentimentDetailLevel {
  BASIC = 0;
  STANDARD = 1;
  DETAILED = 2;
}

message AnalyzeSentimentRequest {
  string user_id = 1;
  string text = 2;
  string model_id = 3;
}

message AnalyzeSentimentResponse {
  string session_id = 1;
  string result_id = 2;
  string sentiment = 3;
  double score = 4;
  string model_id = 5;
  string provider_name = 6;
}

message AnalyzeSentimentDetailedRequest {
  string user_id = 1;
  string text = 2;
  string language = 3;
  SentimentDetailLevel detail_level = 4;
  string model_id = 5;
}

message AnalyzeSentimentDetailedResponse {
  string session_id = 1;
  string result_id = 2;
  string sentiment = 3;
  double score = 4;
  string explanation = 5;
  string model_id = 6;
  string provider_name = 7;
}