syntax = "proto3";

package Sentiment;
import "google/protobuf/timestamp.proto";

service SentimentGrpcService {
  rpc StartSentiment (StartSentimentRequest) returns (StartSentimentResponse);
  rpc DeleteSentiment (DeleteSentimentRequest) returns (DeleteSentimentResponse);
  rpc GetSentimentHistory (GetSentimentHistoryRequest) returns (GetSentimentHistoryResponse);
}

message StartSentimentRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartSentimentResponse {
  string session_id = 1;
}

message DeleteSentimentRequest {
  string session_id = 1;
}

message DeleteSentimentResponse {
  string session_id = 1;
}

message GetSentimentHistoryRequest {
  string user_id = 1;
}

message Sentiment {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message SentimentSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated Sentiment messages = 8;
}

message GetSentimentHistoryResponse {
  repeated SentimentSummary sentiments = 1;
}