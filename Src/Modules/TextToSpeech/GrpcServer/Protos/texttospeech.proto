syntax = "proto3";

package TextToSpeech;

option csharp_namespace = "TextToSpeech.GrpcServer.Protos";

service TextToSpeechGrpcService {
  rpc SynthesizeSpeech (SynthesizeSpeechRequest) returns (SynthesizeSpeechResponse);
  rpc GenerateAudio (GenerateAudioRequest) returns (GenerateAudioResponse);
}

enum VoiceType {
  MALE = 0;
  FEMALE = 1;
  NEUTRAL = 2;
}

enum SpeechSpeed {
  SLOW = 0;
  NORMAL = 1;
  FAST = 2;
}

message SynthesizeSpeechRequest {
  string user_id = 1;
  string text = 2;
  VoiceType voice = 3;
  SpeechSpeed speed = 4;
  string language = 5;
  string model_id = 6;
}

message SynthesizeSpeechResponse {
  string session_id = 1;
  string result_id = 2;
  string audio_url = 3;
  string model_id = 4;
  string provider_name = 5;
}

message GenerateAudioRequest {
  string user_id = 1;
  string text = 2;
  VoiceType voice = 3;
  SpeechSpeed speed = 4;
  string model_id = 5;
}

message GenerateAudioResponse {
  string session_id = 1;
  string audio_url = 2;
  string model_id = 3;
  string provider_name = 4;
}