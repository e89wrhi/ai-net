syntax = "proto3";

package TextToSpeech;
import "google/protobuf/timestamp.proto";

service TextToSpeechGrpcService {
  rpc StartTextToSpeech (StartTextToSpeechRequest) returns (StartTextToSpeechResponse);
  rpc DeleteTextToSpeech (DeleteTextToSpeechRequest) returns (DeleteTextToSpeechResponse);
  rpc GetTextToSpeechHistory (GetTextToSpeechHistoryRequest) returns (GetTextToSpeechHistoryResponse);
}

message StartTextToSpeechRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartTextToSpeechResponse {
  string session_id = 1;
}

message DeleteTextToSpeechRequest {
  string session_id = 1;
}

message DeleteTextToSpeechResponse {
  string session_id = 1;
}

message GetTextToSpeechHistoryRequest {
  string user_id = 1;
}

message TextToSpeech {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message TextToSpeechSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated TextToSpeech messages = 8;
}

message GetTextToSpeechHistoryResponse {
  repeated TextToSpeechSummary texttospeechs = 1;
}