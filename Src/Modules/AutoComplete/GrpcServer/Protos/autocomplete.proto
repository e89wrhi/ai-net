syntax = "proto3";

package AutoComplete;
import "google/protobuf/timestamp.proto";

service AutoCompleteGrpcService {
  rpc StartAutoComplete (StartAutoCompleteRequest) returns (StartAutoCompleteResponse);
  rpc DeleteAutoComplete (DeleteAutoCompleteRequest) returns (DeleteAutoCompleteResponse);
  rpc GetAutoCompleteHistory (GetAutoCompleteHistoryRequest) returns (GetAutoCompleteHistoryResponse);
}

message StartAutoCompleteRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartAutoCompleteResponse {
  string session_id = 1;
}

message DeleteAutoCompleteRequest {
  string session_id = 1;
}

message DeleteAutoCompleteResponse {
  string session_id = 1;
}

message GetAutoCompleteHistoryRequest {
  string user_id = 1;
}

message AutoComplete {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message AutoCompleteSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated AutoComplete messages = 8;
}

message GetAutoCompleteHistoryResponse {
  repeated AutoCompleteSummary autoCompletes = 1;
}