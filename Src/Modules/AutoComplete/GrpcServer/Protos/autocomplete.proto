syntax = "proto3";

package AutoComplete;

option csharp_namespace = "AutoComplete.GrpcServer.Protos";

service AutoCompleteGrpcService {
  rpc GenerateAutoComplete (GenerateAutoCompleteRequest) returns (GenerateAutoCompleteResponse);
  rpc StreamAutoComplete (StreamAutoCompleteRequest) returns (stream StreamAutoCompleteResponse);
}

enum CompletionMode {
  INLINE = 0;
  MULTI_LINE = 1;
  CODE = 2;
  TEXT = 3;
}

message GenerateAutoCompleteRequest {
  string user_id = 1;
  string prompt = 2;
  CompletionMode mode = 3;
  string model_id = 4;
}

message GenerateAutoCompleteResponse {
  string completion = 1;
  int64 tokens_used = 2;
  double estimated_cost = 3;
  string model_id = 4;
  string provider_name = 5;
}

message StreamAutoCompleteRequest {
  string user_id = 1;
  string prompt = 2;
  CompletionMode mode = 3;
  string model_id = 4;
}

message StreamAutoCompleteResponse {
  string text = 1;
}