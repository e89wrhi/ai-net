syntax = "proto3";

package ImageEdit;

option csharp_namespace = "ImageEdit.GrpcServer.Protos";

service ImageEditGrpcService {
  rpc EnhanceImage (EnhanceImageRequest) returns (EnhanceImageResponse);
  rpc RemoveBackground (RemoveBackgroundRequest) returns (RemoveBackgroundResponse);
}

enum ImageQuality {
  LOW = 0;
  MEDIUM = 1;
  HIGH = 2;
}

enum ImageFormat {
  PNG = 0;
  JPEG = 1;
  WEBP = 2;
}

message EnhanceImageRequest {
  string user_id = 1;
  string image_url_or_base64 = 2;
  string prompt = 3;
  ImageQuality quality = 4;
  ImageFormat format = 5;
  string model_id = 6;
}

message EnhanceImageResponse {
  string session_id = 1;
  string result_id = 2;
  string result_image_url = 3;
  string model_id = 4;
  string provider_name = 5;
}

message RemoveBackgroundRequest {
  string user_id = 1;
  string image_url_or_base64 = 2;
  ImageQuality quality = 3;
  ImageFormat format = 4;
  string model_id = 5;
}

message RemoveBackgroundResponse {
  string session_id = 1;
  string result_id = 2;
  string result_image_url = 3;
  string model_id = 4;
  string provider_name = 5;
}