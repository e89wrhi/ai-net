syntax = "proto3";

package ImageEdit;
import "google/protobuf/timestamp.proto";

service ImageEditGrpcService {
  rpc StartImageEdit (StartImageEditRequest) returns (StartImageEditResponse);
  rpc DeleteImageEdit (DeleteImageEditRequest) returns (DeleteImageEditResponse);
  rpc GetImageEditHistory (GetImageEditHistoryRequest) returns (GetImageEditHistoryResponse);
}

message StartImageEditRequest {
  string user_id = 1;
  string title = 2;
  string ai_model_id = 3;
}

message StartImageEditResponse {
  string session_id = 1;
}

message DeleteImageEditRequest {
  string session_id = 1;
}

message DeleteImageEditResponse {
  string session_id = 1;
}

message GetImageEditHistoryRequest {
  string user_id = 1;
}

message ImageEdit {
  string id = 1;
  string content = 2;
  string sender = 3;
  google.protobuf.Timestamp sent_at = 4;
  int32 token_used = 5;
}

message ImageEditSummary {
  string id = 1;
  string title = 2;
  string summary = 3;
  string ai_model_id = 4;
  string session_status = 5;
  google.protobuf.Timestamp last_sent_at = 6;
  int32 total_tokens = 7;
  repeated ImageEdit messages = 8;
}

message GetImageEditHistoryResponse {
  repeated ImageEditSummary imageedits = 1;
}